version: '3.3'

services:
  greentech2023:
    build: .
    container_name: startupgt23
    restart: unless-stopped
    ports:
      - "8023:80"
    networks:
      - nginx-proxy-manager
    environment:
      - VIRTUAL_HOST=greentech.startupterrace.tw
      - VIRTUAL_PATH=/2023
      - VIRTUAL_PORT=80
    labels:
      - "traefik.enable=false"

networks:
  nginx-proxy-manager:
    external: true
