server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Handle /2023/img/ requests for images
    location /2023/img/ {
        alias /usr/share/nginx/html/img/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Handle /2023 and /2023/ requests for HTML
    location /2023 {
        alias /usr/share/nginx/html/;
        try_files /index.html =404;
    }

    # Direct access to images (for port 8023)
    location /img/ {
        alias /usr/share/nginx/html/img/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Default root access
    location / {
        try_files $uri $uri/ /index.html;
    }
}
